name: Mise à jour Veille Technologique

on:
  # ── Déclenchement planifié : 1er et 15 de chaque mois à minuit UTC ──────────
  schedule:
    - cron: '0 0 1,15 * *'

  # ── Déclenchement manuel depuis l'onglet "Actions" de GitHub ────────────────
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Mode test (n'écrit pas dans index.html)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Permissions minimales : lecture du code + écriture pour le commit
permissions:
  contents: write

jobs:
  update-veille:
    name: 🔄 Mettre à jour la veille techno
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. Récupération du code ────────────────────────────────────────────
      - name: Checkout du dépôt
        uses: actions/checkout@v4
        with:
          # Nécessaire pour que git push fonctionne avec le token par défaut
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python ─────────────────────────────────────────────────────────
      - name: Configurer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── 3. Dépendances ────────────────────────────────────────────────────
      - name: Installer les dépendances
        run: pip install feedparser==6.0.11

      # ── 4. Exécution du script ─────────────────────────────────────────────
      - name: Exécuter update_veille.py
        env:
          # Secret optionnel : ajouter OPENAI_API_KEY dans Settings > Secrets
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
            echo "⚠️  Mode DRY-RUN activé — index.html ne sera pas modifié."
          fi
          python update_veille.py --html-file index.html $DRY_FLAG

      # ── 5. Vérification des changements ───────────────────────────────────
      - name: Vérifier si index.html a été modifié
        id: diff
        run: |
          if git diff --quiet index.html; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Aucun changement détecté dans index.html."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ Modifications détectées dans index.html."
          fi

      # ── 6. Commit & push (seulement si des changements existent) ──────────
      - name: Committer et pousser les changements
        if: steps.diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "🤖 Veille techno mise à jour — $(date +'%d/%m/%Y')"
          git push

      # ── 7. Résumé dans le log Actions ─────────────────────────────────────
      - name: Résumé de l'exécution
        if: always()
        run: |
          echo "## Rapport d'exécution" >> $GITHUB_STEP_SUMMARY
          echo "- **Date** : $(date +'%d/%m/%Y à %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Déclencheur** : ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode dry-run** : ${{ github.event.inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **OpenAI activé** : ${{ secrets.OPENAI_API_KEY != '' && 'Oui' || 'Non (mode RSS)' }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            echo "- **Résultat** : ✅ index.html mis à jour et committé" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Résultat** : ℹ️ Aucune modification (contenu déjà à jour)" >> $GITHUB_STEP_SUMMARY
          fi
