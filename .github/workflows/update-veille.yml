name: Mise a jour Veille Technologique

on:
  schedule:
    - cron: "0 0 1,15 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Mode test (n'ecrit pas dans index.html)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  update-veille:
    name: Mettre a jour la veille techno
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installer les dependances
        run: pip install feedparser==6.0.11

      - name: Executer update_veille.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
            echo "Mode DRY-RUN active."
          fi
          python update_veille.py --html-file index.html $DRY_FLAG

      - name: Verifier si index.html a ete modifie
        id: diff
        run: |
          if git diff --quiet index.html; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Committer et pousser les changements
        if: steps.diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Veille techno mise a jour - $(date +'%d/%m/%Y')"
          git push
