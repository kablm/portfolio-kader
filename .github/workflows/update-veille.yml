name: Mise a jour Veille Technologique

on:
  schedule:
    - cron: "0 0 1,15 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-veille:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du depot
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # AUCUNE MENTION DE CACHE ICI

      - name: Installer les dependances
        run: pip install feedparser==6.0.11

      - name: Executer le script
        run: python update_veille.py --html-file index.html

      - name: Committer les changements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Veille techno mise a jour" || echo "Rien a mettre a jour"
          git push
